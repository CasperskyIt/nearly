<div class="welcome-overlay">
  <div class="content">
    <h1>Discover Nearby Adventures</h1>
    <p>Find hidden gems, coffee spots, parks and more around you</p>
    
    <div class="location-btn-container">
      <button mat-fab class="location-btn" (click)="onLocate()">
        <mat-icon>my_location</mat-icon>
      </button>
      <div class="pulse-ring"></div>
      <div class="pulse-ring delay-1"></div>
      <div class="pulse-ring delay-2"></div>
    </div>
    
    <span class="hint">Tap to find adventures near you</span>
  </div>
</div>
