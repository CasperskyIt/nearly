<div class="app-container" [class.dark-mode]="darkMode()">
  <header class="header">
    <div class="header-left">
      <button class="menu-btn" (click)="toggleMenu()">
        <span class="material-icon">menu</span>
      </button>
      @if (mapRef?.getLogo()) {
        <div class="app-logo" [innerHTML]="mapRef.getLogo()"></div>
      }
      <h1 class="app-title">{{ themeStrings().appName }}</h1>
    </div>
    <div class="header-right">
      <button class="icon-btn lang-btn" (click)="toggleLangMenu()">
        <span class="material-icon">language</span>
        <span class="lang-code">{{ currentLanguage.toUpperCase() }}</span>
      </button>
      <button class="icon-btn" (click)="mapRef?.toggleDarkMode()">
        <span class="material-icon">{{ darkMode() ? 'light_mode' : 'dark_mode' }}</span>
      </button>
      <button class="icon-btn" (click)="mapRef?.onLocate()">
        <span class="material-icon">my_location</span>
      </button>
    </div>
  </header>

  @if (showLangMenu()) {
    <div class="lang-menu">
      @for (lang of languages; track lang.code) {
        <button
          class="lang-option"
          [class.active]="currentLanguage === lang.code"
          (click)="setLanguage(lang.code)">
          {{ lang.name }}
        </button>
      }
    </div>
  }

  <div class="filters-bar">
    @for (category of categories; track category.id) {
      <button
        class="filter-chip"
        [class.active]="selectedCategories().has(category.id)"
        (click)="toggleCategory(category.id)">
        <span class="material-icon">{{ category.icon }}</span>
        <span class="chip-label">{{ category.label }}</span>
      </button>
    }
  </div>

  @if (showList()) {
    <div class="places-sidebar">
      <div class="sidebar-header">
        <h2>{{ t.places.title }}</h2>
        <span class="places-count">{{ visiblePlaces().length }} {{ t.places.count }}</span>
      </div>
      <div class="places-scroll">
        <app-places-list
          [places]="visiblePlaces()"
          [selectedPlace]="selectedPlace()"
          [isLoading]="isLoading()"
          [getCategoryColor]="getCategoryColor"
          [getCategoryIcon]="getCategoryIcon"
          [getCategoryLabel]="getCategoryLabel"
          (selectPlace)="onPlaceSelected($event)">
        </app-places-list>
      </div>
    </div>
  }

  <button class="sidebar-toggle" (click)="toggleList()" [class.collapsed]="!showList()">
    <span class="material-icon">{{ showList() ? 'chevron_left' : 'chevron_right' }}</span>
  </button>

  <app-map #mapRef
    [selectedCategories]="selectedCategories()"
    [showList]="showList()"
    (placeSelected)="onPlaceSelected($event)"
    (loadingChange)="isLoading.set($event)"
    (visiblePlacesChange)="onVisiblePlacesChanged($event)">
  </app-map>
</div>
