<div class="dog-create-page">
  <div class="page-header">
    <button mat-icon-button (click)="onCancel()" aria-label="Back">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1>Add Dog</h1>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="dog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" placeholder="Your dog's name" />
      @if (form.controls.name.hasError('required') && form.controls.name.touched) {
        <mat-error>Name is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Breed</mat-label>
      <input matInput formControlName="breed" placeholder="e.g. Golden Retriever" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Date of Birth</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="dateOfBirth" placeholder="Pick a date" />
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <div class="form-actions">
      <button mat-button type="button" (click)="onCancel()">Cancel</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="submitting()">
        @if (submitting()) {
          Adding...
        } @else {
          Add Dog
        }
      </button>
    </div>
  </form>
</div>
